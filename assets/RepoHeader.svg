<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#58a6ff" flood-opacity="0.3"/>
    </filter>
    <filter id="textglow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  
  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#58a6ff">
    <circle cx="50" cy="50" r="1.5"/><circle cx="90" cy="50" r="1.5"/><circle cx="130" cy="50" r="1.5"/><circle cx="170" cy="50" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/><circle cx="90" cy="90" r="1.5"/><circle cx="130" cy="90" r="1.5"/><circle cx="170" cy="90" r="1.5"/>
    <circle cx="50" cy="130" r="1.5"/><circle cx="90" cy="130" r="1.5"/><circle cx="130" cy="130" r="1.5"/><circle cx="170" cy="130" r="1.5"/>
    <circle cx="1030" cy="170" r="1.5"/><circle cx="1070" cy="170" r="1.5"/><circle cx="1110" cy="170" r="1.5"/><circle cx="1150" cy="170" r="1.5"/>
    <circle cx="1030" cy="210" r="1.5"/><circle cx="1070" cy="210" r="1.5"/><circle cx="1110" cy="210" r="1.5"/><circle cx="1150" cy="210" r="1.5"/>
    <circle cx="1030" cy="250" r="1.5"/><circle cx="1070" cy="250" r="1.5"/><circle cx="1110" cy="250" r="1.5"/><circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1.5"/>
  
  <!-- Left glow -->
  <ellipse cx="350" cy="150" rx="300" ry="200" fill="#58a6ff" opacity="0.03"/>
  
  <!-- Soccer ball icon -->
  <g transform="translate(280, 100)" filter="shadow">
    <circle cx="50" cy="50" r="42" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
    <path d="M50 8 L50 28 M50 72 L50 92 M8 50 L28 50 M72 50 L92 50" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <path d="M50 20 L62 35 L58 52 L42 52 L38 35 Z" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.6"/>
    <path d="M50 20 L38 35 L22 32 M50 20 L62 35 L78 32 M38 35 L42 52 L30 62 M62 35 L58 52 L70 62 M42 52 L50 68 L58 52" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <circle cx="50" cy="50" r="5" fill="#58a6ff" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="420" y="120" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" filter="textglow" letter-spacing="-1">Agent Copa</text>
  <text x="770" y="120" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="56" font-weight="300" fill="url(#accent)" filter="textglow" letter-spacing="-1">.ai</text>

  <!-- Subtitle -->
  <text x="420" y="160" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="20" fill="#8b949e" font-weight="400" letter-spacing="0.5">FIFA World Cup 2026 — AI-Powered Assistant</text>

  <!-- Tech badges -->
  <g transform="translate(420, 185)">
    <rect x="0" y="0" width="72" height="26" rx="13" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="36" y="17" font-family="'Segoe UI', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="500">AG-UI</text>
    
    <rect x="82" y="0" width="105" height="26" rx="13" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="134" y="17" font-family="'Segoe UI', monospace" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="500">Copilot SDK</text>
    
    <rect x="197" y="0" width="95" height="26" rx="13" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="244" y="17" font-family="'Segoe UI', monospace" font-size="11" fill="#f778ba" text-anchor="middle" font-weight="500">CopilotKit</text>
    
    <rect x="302" y="0" width="58" height="26" rx="13" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="331" y="17" font-family="'Segoe UI', monospace" font-size="11" fill="#7ee787" text-anchor="middle" font-weight="500">MCP</text>
    
    <rect x="370" y="0" width="72" height="26" rx="13" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="406" y="17" font-family="'Segoe UI', monospace" font-size="11" fill="#e6edf3" text-anchor="middle" font-weight="500">Next.js</text>
  </g>

  <!-- Stats line -->
  <text x="420" y="248" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-size="15" fill="#484f58" font-weight="400" letter-spacing="1">48 teams  ·  104 matches  ·  16 stadiums  ·  3 host nations</text>

  <!-- Bottom accent line -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" rx="1.5"/>
</svg>
