<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380">
  <defs>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#58a6ff" flood-opacity="0.35"/>
    </filter>
    <filter id="windowshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="380" fill="#0d1017" rx="0"/>

  <!-- Terminal window -->
  <g filter="windowshadow">
    <!-- Window body -->
    <rect x="60" y="20" width="1080" height="340" fill="url(#body)" rx="10"/>
    
    <!-- Title bar -->
    <rect x="60" y="20" width="1080" height="38" fill="url(#titlebar)" rx="10"/>
    <rect x="60" y="48" width="1080" height="10" fill="url(#titlebar)"/>
    
    <!-- Traffic light buttons -->
    <circle cx="90" cy="39" r="6.5" fill="#ff5f57"/>
    <circle cx="112" cy="39" r="6.5" fill="#febc2e"/>
    <circle cx="134" cy="39" r="6.5" fill="#28c840"/>
    
    <!-- Window title -->
    <text x="600" y="44" font-family="'SF Mono', 'Consolas', 'Courier New', monospace" font-size="13" fill="#8b8b8b" text-anchor="middle">copa@worldcup2026 — zsh — 120x40</text>
  </g>

  <!-- Terminal content -->
  <g font-family="'SF Mono', 'Consolas', 'Courier New', monospace">
    
    <!-- Prompt line 1 -->
    <text x="90" y="88" font-size="13" fill="#7ee787" xml:space="preserve">❯</text>
    <text x="108" y="88" font-size="13" fill="#e6edf3" xml:space="preserve">copa --start</text>
    
    <!-- Blank line -->
    
    <!-- ASCII art output with gradient colors -->
    <text x="90" y="118" font-size="14" fill="#58a6ff" xml:space="preserve">    ___                    __      ______                              _ </text>
    <text x="90" y="136" font-size="14" fill="#58a6ff" xml:space="preserve">   /   |  ____ ____  ___  / /_    / ____/___  ____  ____ _   ____ _  (_)</text>
    <text x="90" y="154" font-size="14" fill="#79b8ff" xml:space="preserve">  / /| | / __ `/ _ \/ _ \/ __/   / /   / __ \/ __ \/ __ `/  / __ `/ / / </text>
    <text x="90" y="172" font-size="14" fill="#bc8cff" xml:space="preserve"> / ___ |/ /_/ /  __/  __/ /_    / /___/ /_/ / /_/ / /_/ /_ / /_/ / / /  </text>
    <text x="90" y="190" font-size="14" fill="#d2a8ff" xml:space="preserve">/_/  |_|\__, /\___/\___/\__/    \____/\____/ .___/\__,_/(_)\__,_/_/_/   </text>
    <text x="90" y="208" font-size="14" fill="#f778ba" xml:space="preserve">       /____/                             /_/                          </text>

    <!-- Info lines -->
    <text x="90" y="240" font-size="13" fill="#484f58" xml:space="preserve">──────────────────────────────────────────────────────────────────────</text>
    
    <text x="90" y="262" font-size="13" fill="#8b949e" xml:space="preserve">  FIFA World Cup 2026 — AI-Powered Assistant</text>
    <text x="90" y="282" font-size="13" fill="#484f58" xml:space="preserve">  48 teams · 104 matches · 16 stadiums · 3 host nations</text>

    <text x="90" y="308" font-size="13" fill="#484f58" xml:space="preserve">──────────────────────────────────────────────────────────────────────</text>

    <!-- Tech stack as key-value pairs -->
    <text x="90" y="330" font-size="13" xml:space="preserve"><tspan fill="#7ee787">  protocol</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#e6edf3">AG-UI</tspan><tspan fill="#484f58">    engine</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#bc8cff">Copilot SDK</tspan><tspan fill="#484f58">    ui</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#f778ba">CopilotKit</tspan><tspan fill="#484f58">    tools</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#58a6ff">MCP</tspan></text>
    
    <!-- Blinking cursor -->
    <text x="90" y="352" font-size="13" fill="#7ee787" xml:space="preserve">❯</text>
    <rect x="108" y="341" width="8" height="15" fill="#7ee787" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
