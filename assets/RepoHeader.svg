<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="350" viewBox="0 0 1200 350">
  <defs>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Terminal window (full width) -->
  <rect width="1200" height="350" fill="url(#body)" rx="10"/>
  <rect width="1200" height="38" fill="url(#titlebar)" rx="10"/>
  <rect y="28" width="1200" height="10" fill="url(#titlebar)"/>

  <!-- Traffic lights -->
  <circle cx="30" cy="19" r="6.5" fill="#ff5f57"/>
  <circle cx="52" cy="19" r="6.5" fill="#febc2e"/>
  <circle cx="74" cy="19" r="6.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="600" y="24" font-family="'SF Mono','Consolas','Courier New',monospace" font-size="13" fill="#8b8b8b" text-anchor="middle">copa — worldcup2026 — zsh</text>

  <!-- Terminal content -->
  <g font-family="'Consolas','SF Mono','Courier New',monospace">

    <!-- Prompt -->
    <text x="30" y="68" font-size="13" fill="#7ee787">❯</text>
    <text x="48" y="68" font-size="13" fill="#e6edf3">copa --start</text>

    <!-- AGENT label -->
    <text x="30" y="90" font-size="11" fill="#484f58" letter-spacing="6">AGENT</text>

    <!-- COPA.AI in Unicode Box Drawing (█ ╔ ╗ ║ ╚ ╝ ═) -->
    <text x="30" y="110" font-size="12" fill="#58a6ff" xml:space="preserve"> ██████╗  ██████╗ ██████╗  █████╗         █████╗ ██╗</text>
    <text x="30" y="124" font-size="12" fill="#58a6ff" xml:space="preserve">██╔════╝ ██╔═══██╗██╔══██╗██╔══██╗       ██╔══██╗██║</text>
    <text x="30" y="138" font-size="12" fill="#79b8ff" xml:space="preserve">██║      ██║   ██║██████╔╝███████║       ███████║██║</text>
    <text x="30" y="152" font-size="12" fill="#bc8cff" xml:space="preserve">██║      ██║   ██║██╔═══╝ ██╔══██║  ██╗  ██╔══██║██║</text>
    <text x="30" y="166" font-size="12" fill="#d2a8ff" xml:space="preserve">╚██████╗ ╚██████╔╝██║     ██║  ██║  ╚═╝  ██║  ██║██║</text>
    <text x="30" y="180" font-size="12" fill="#f778ba" xml:space="preserve"> ╚═════╝  ╚═════╝ ╚═╝     ╚═╝  ╚═╝       ╚═╝  ╚═╝╚═╝</text>

    <!-- Separator -->
    <text x="30" y="202" font-size="12" fill="#30363d" xml:space="preserve">─────────────────────────────────────────────────────────────────────────</text>

    <!-- Info -->
    <text x="30" y="224" font-size="13" fill="#8b949e" xml:space="preserve">  FIFA World Cup 2026 — AI-Powered Assistant</text>
    <text x="30" y="244" font-size="13" fill="#484f58" xml:space="preserve">  48 teams · 104 matches · 16 stadiums · 3 host nations</text>

    <!-- Separator -->
    <text x="30" y="266" font-size="12" fill="#30363d" xml:space="preserve">─────────────────────────────────────────────────────────────────────────</text>

    <!-- Tech stack key=value -->
    <text x="30" y="288" font-size="13" xml:space="preserve"><tspan fill="#7ee787">  protocol</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#e6edf3">AG-UI</tspan><tspan fill="#484f58">    engine</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#bc8cff">Copilot SDK</tspan><tspan fill="#484f58">    ui</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#f778ba">CopilotKit</tspan><tspan fill="#484f58">    tools</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#58a6ff">MCP</tspan></text>

    <!-- Blinking cursor -->
    <text x="30" y="326" font-size="13" fill="#7ee787">❯</text>
    <rect x="48" y="315" width="8" height="15" fill="#7ee787" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
