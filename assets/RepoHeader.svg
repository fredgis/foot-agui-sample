<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="windowshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="400" fill="#0d1017"/>

  <!-- Terminal window -->
  <g filter="windowshadow">
    <rect x="60" y="10" width="1080" height="380" fill="url(#body)" rx="10"/>
    <rect x="60" y="10" width="1080" height="38" fill="url(#titlebar)" rx="10"/>
    <rect x="60" y="38" width="1080" height="10" fill="url(#titlebar)"/>

    <!-- Traffic lights -->
    <circle cx="90" cy="29" r="6.5" fill="#ff5f57"/>
    <circle cx="112" cy="29" r="6.5" fill="#febc2e"/>
    <circle cx="134" cy="29" r="6.5" fill="#28c840"/>

    <!-- Window title -->
    <text x="600" y="34" font-family="'SF Mono','Consolas','Courier New',monospace" font-size="13" fill="#8b8b8b" text-anchor="middle">copa — worldcup2026 — zsh</text>
  </g>

  <!-- Terminal content -->
  <g font-family="'Consolas','SF Mono','Courier New',monospace">

    <!-- Prompt -->
    <text x="90" y="78" font-size="13" fill="#7ee787">❯</text>
    <text x="112" y="78" font-size="13" fill="#e6edf3">copa --start</text>

    <!-- AGENT label -->
    <text x="90" y="100" font-size="11" fill="#484f58" letter-spacing="6">AGENT</text>

    <!-- COPA.AI in Unicode Box Drawing (█ ╔ ╗ ║ ╚ ╝ ═) -->
    <text x="90" y="118" font-size="12" fill="#58a6ff" xml:space="preserve"> ██████╗  ██████╗ ██████╗  █████╗         █████╗ ██╗</text>
    <text x="90" y="132" font-size="12" fill="#58a6ff" xml:space="preserve">██╔════╝ ██╔═══██╗██╔══██╗██╔══██╗       ██╔══██╗██║</text>
    <text x="90" y="146" font-size="12" fill="#79b8ff" xml:space="preserve">██║      ██║   ██║██████╔╝███████║       ███████║██║</text>
    <text x="90" y="160" font-size="12" fill="#bc8cff" xml:space="preserve">██║      ██║   ██║██╔═══╝ ██╔══██║  ██╗  ██╔══██║██║</text>
    <text x="90" y="174" font-size="12" fill="#d2a8ff" xml:space="preserve">╚██████╗ ╚██████╔╝██║     ██║  ██║  ╚═╝  ██║  ██║██║</text>
    <text x="90" y="188" font-size="12" fill="#f778ba" xml:space="preserve"> ╚═════╝  ╚═════╝ ╚═╝     ╚═╝  ╚═╝       ╚═╝  ╚═╝╚═╝</text>

    <!-- Separator -->
    <text x="90" y="210" font-size="12" fill="#30363d" xml:space="preserve">─────────────────────────────────────────────────────────</text>

    <!-- Info -->
    <text x="90" y="232" font-size="13" fill="#8b949e" xml:space="preserve">  FIFA World Cup 2026 — AI-Powered Assistant</text>
    <text x="90" y="252" font-size="13" fill="#484f58" xml:space="preserve">  48 teams · 104 matches · 16 stadiums · 3 host nations</text>

    <!-- Separator -->
    <text x="90" y="274" font-size="12" fill="#30363d" xml:space="preserve">─────────────────────────────────────────────────────────</text>

    <!-- Tech stack key=value -->
    <text x="90" y="296" font-size="13" xml:space="preserve"><tspan fill="#7ee787">  protocol</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#e6edf3">AG-UI</tspan><tspan fill="#484f58">    engine</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#bc8cff">Copilot SDK</tspan><tspan fill="#484f58">    ui</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#f778ba">CopilotKit</tspan><tspan fill="#484f58">    tools</tspan><tspan fill="#484f58"> = </tspan><tspan fill="#58a6ff">MCP</tspan></text>

    <!-- Blinking cursor -->
    <text x="90" y="334" font-size="13" fill="#7ee787">❯</text>
    <rect x="108" y="323" width="8" height="15" fill="#7ee787" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
