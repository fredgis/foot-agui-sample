<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <filter id="textglow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#58a6ff" flood-opacity="0.5"/>
    </filter>
    <filter id="greenglow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7ee787" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="12"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Scanline effect -->
  <g opacity="0.03" fill="#58a6ff">
    <rect x="0" y="20" width="1200" height="1"/>
    <rect x="0" y="40" width="1200" height="1"/>
    <rect x="0" y="60" width="1200" height="1"/>
    <rect x="0" y="80" width="1200" height="1"/>
    <rect x="0" y="100" width="1200" height="1"/>
    <rect x="0" y="120" width="1200" height="1"/>
    <rect x="0" y="140" width="1200" height="1"/>
    <rect x="0" y="160" width="1200" height="1"/>
    <rect x="0" y="180" width="1200" height="1"/>
    <rect x="0" y="200" width="1200" height="1"/>
    <rect x="0" y="220" width="1200" height="1"/>
    <rect x="0" y="240" width="1200" height="1"/>
    <rect x="0" y="260" width="1200" height="1"/>
    <rect x="0" y="280" width="1200" height="1"/>
    <rect x="0" y="300" width="1200" height="1"/>
    <rect x="0" y="320" width="1200" height="1"/>
  </g>

  <!-- ASCII art title -->
  <g filter="textglow">
    <text x="600" y="55" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#58a6ff" text-anchor="middle" xml:space="preserve">    ___                    __      ______                              _</text>
    <text x="600" y="73" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#58a6ff" text-anchor="middle" xml:space="preserve">   /   |  ____ ____  ___  / /_    / ____/___  ____  ____ _   ____ _  (_)</text>
    <text x="600" y="91" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#7ea8d4" text-anchor="middle" xml:space="preserve">  / /| | / __ `/ _ \/ _ \/ __/   / /   / __ \/ __ \/ __ `/  / __ `/ / /</text>
    <text x="600" y="109" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#bc8cff" text-anchor="middle" xml:space="preserve"> / ___ |/ /_/ /  __/  __/ /_    / /___/ /_/ / /_/ / /_/ /_ / /_/ / / /</text>
    <text x="600" y="127" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#f778ba" text-anchor="middle" xml:space="preserve">/_/  |_|\__, /\___/\___/\__/    \____/\____/ .___/\__,_/(_)\__,_/_/_/</text>
    <text x="600" y="145" font-family="'Courier New', 'Consolas', monospace" font-size="16" fill="#f778ba" text-anchor="middle" xml:space="preserve">       /____/                             /_/</text>
  </g>

  <!-- Terminal prompt style subtitle -->
  <text x="600" y="182" font-family="'Courier New', 'Consolas', monospace" font-size="15" fill="#7ee787" text-anchor="middle" filter="greenglow" xml:space="preserve">&gt; FIFA World Cup 2026 — AI-Powered Assistant _</text>

  <!-- Decorative separator -->
  <text x="600" y="210" font-family="'Courier New', 'Consolas', monospace" font-size="12" fill="#30363d" text-anchor="middle" xml:space="preserve">═══════════════════════════════════════════════════════════════════</text>

  <!-- Tech badges in terminal style -->
  <g transform="translate(600, 225)" font-family="'Courier New', 'Consolas', monospace" font-size="13" text-anchor="middle">
    <text x="-280" y="12" fill="#484f58">[</text>
    <text x="-245" y="12" fill="#58a6ff">AG-UI</text>
    <text x="-210" y="12" fill="#484f58">]</text>

    <text x="-170" y="12" fill="#484f58">[</text>
    <text x="-113" y="12" fill="#bc8cff">Copilot SDK</text>
    <text x="-56" y="12" fill="#484f58">]</text>

    <text x="-16" y="12" fill="#484f58">[</text>
    <text x="42" y="12" fill="#f778ba">CopilotKit</text>
    <text x="100" y="12" fill="#484f58">]</text>

    <text x="136" y="12" fill="#484f58">[</text>
    <text x="160" y="12" fill="#7ee787">MCP</text>
    <text x="184" y="12" fill="#484f58">]</text>

    <text x="220" y="12" fill="#484f58">[</text>
    <text x="254" y="12" fill="#e6edf3">Next.js</text>
    <text x="288" y="12" fill="#484f58">]</text>
  </g>

  <!-- Soccer balls + stats -->
  <text x="600" y="270" font-family="'Courier New', 'Consolas', monospace" font-size="13" fill="#8b949e" text-anchor="middle" xml:space="preserve">⚽ 48 teams · 104 matches · 16 stadiums · 3 nations ⚽</text>

  <!-- ASCII soccer ball art -->
  <g opacity="0.12">
    <text x="80" y="265" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve">    _____</text>
    <text x="80" y="277" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve"> ,-'     `-.</text>
    <text x="80" y="289" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve">/   o   o   \</text>
    <text x="80" y="301" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve">|  o  *  o  |</text>
    <text x="80" y="313" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve">\   o   o   /</text>
    <text x="80" y="325" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#58a6ff" xml:space="preserve"> `-._____.-'</text>
  </g>
  <g opacity="0.12">
    <text x="1040" y="265" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve">    _____</text>
    <text x="1040" y="277" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve"> ,-'     `-.</text>
    <text x="1040" y="289" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve">/   o   o   \</text>
    <text x="1040" y="301" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve">|  o  *  o  |</text>
    <text x="1040" y="313" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve">\   o   o   /</text>
    <text x="1040" y="325" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#f778ba" xml:space="preserve"> `-._____.-'</text>
  </g>

  <!-- Flags -->
  <text x="600" y="305" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif" font-size="22" text-anchor="middle">🇺🇸  🇲🇽  🇨🇦</text>

  <!-- Bottom accent line -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#accent)" rx="1.5"/>
</svg>
